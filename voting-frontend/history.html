<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История голосований</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" id="mainNav"></nav>

    <div class="container mt-4">
        <h1>История голосований</h1>
        <p class="text-muted">Голосования, в которых вы участвовали</p>

        <div id="historyList" class="row g-4 mt-2">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-dark" role="status"></div>
                <p class="text-muted mt-2">Загрузка...</p>
            </div>
        </div>
    </div>

    <footer class="bg-light text-center py-4 border-top">
        <div class="container">
            <p class="text-muted mb-0">Онлайн-сервис голосований</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        initAuth();

        async function loadHistory() {
            try {
                const polls = await api('/polls/history');
                const container = document.getElementById('historyList');

                if (polls.length === 0) {
                    container.innerHTML = '<div class="col-12"><div class="alert alert-dark">Вы еще не участвовали ни в одном голосовании</div></div>';
                    return;
                }

                container.innerHTML = polls.map(poll => `
                    <div class="col-md-6 col-lg-4">
                        <div class="card poll-card h-100 shadow-sm border-0">
                            <div class="poll-image-wrapper">
                                <img src="${resolveImageUrl(poll.imageUrl) || 'https://images.unsplash.com/photo-1540910419-bcae71f8fe6e?w=600&h=400&fit=crop'}"
                                     class="card-img-top poll-image" alt="${poll.title}">
                                <div class="poll-image-overlay"></div>
                                <span class="badge bg-success poll-type-badge">ПРОГОЛОСОВАНО</span>
                            </div>
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${poll.title}</h5>
                                <p class="card-text text-muted small">${poll.type === 'SingleChoice' ? 'Один вариант' : poll.type === 'MultipleChoice' ? 'Несколько' : 'Да / Нет'}</p>
                                <p class="card-text text-muted small">${poll.endsAt ? 'До ' + formatDate(poll.endsAt) : ''}</p>
                                <a href="/poll.html?id=${poll.id}&v=2" class="btn btn-outline-dark mt-auto">Посмотреть результаты</a>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                Toast.error(e.message);
            }
        }

        loadHistory();
    </script>
</body>
</html>
