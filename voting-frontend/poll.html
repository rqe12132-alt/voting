<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Голосование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" id="mainNav"></nav>

    <div class="container mt-4">
        <div id="pollContainer">
            <div class="text-center py-5">
                <div class="spinner-border text-dark" role="status"></div>
                <p class="text-muted mt-2">Загрузка...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
    <script src="/js/api.js?v=2"></script>
    <script src="/js/toast.js?v=2"></script>
    <script src="/js/auth.js?v=2"></script>
    <script>
        initAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const pollId = urlParams.get('id');
        let pollData = null;
        let connection = null;
        let hasVoted = false;
        let currentResults = null;
        let selectedOptionIds = [];

        async function loadPoll() {
            console.log('[DEBUG] loadPoll started');
            try {
                pollData = await api(`/polls/${pollId}`);
                console.log('[DEBUG] pollData loaded:', pollData.id);
                
                let myVote = null;
                try {
                    myVote = await api(`/polls/${pollId}/my-vote`);
                    console.log('[DEBUG] myVote response:', myVote);
                } catch (e) {
                    console.log('[DEBUG] myVote error:', e.message);
                }
                
                hasVoted = !!myVote;
                if (myVote && myVote.optionIds) {
                    selectedOptionIds = myVote.optionIds;
                    console.log('[DEBUG] selectedOptionIds:', selectedOptionIds);
                } else {
                    console.log('[DEBUG] no myVote or no optionIds');
                }

                const visibility = pollData.resultsVisibility;
                const isAlwaysVisible = visibility === 'AlwaysVisible';

                // Build container structure
                document.getElementById('pollContainer').innerHTML = `
                    <div class="row justify-content-center">
                        <div class="col-lg-8">
                            <div class="text-center mb-4">
                                ${pollData.imageUrl ? `<img src="${resolveImageUrl(pollData.imageUrl)}" class="img-fluid rounded poll-hero-image mb-3" alt="${pollData.title}">` : ''}
                                <h2>${pollData.title}</h2>
                                ${pollData.description ? `<p class="text-muted">${pollData.description}</p>` : ''}
                                <div class="d-flex justify-content-center gap-3 text-muted small">
                                    ${pollData.startsAt ? `<span>Начало: ${formatDateTime(pollData.startsAt)}</span>` : ''}
                                    ${pollData.endsAt ? `<span>Окончание: ${formatDateTime(pollData.endsAt)}</span>` : ''}
                                </div>
                            </div>
                            <div id="resultsBlock"></div>
                            <div id="voteFormBlock"></div>
                            <div id="backButton" class="mt-4">
                                <a href="/index.html" class="btn btn-outline-dark">Назад к списку</a>
                            </div>
                        </div>
                    </div>
                `;

                if (isAlwaysVisible) {
                    // Results always visible
                    const results = await api(`/polls/${pollId}/results`).catch(() => null);
                    currentResults = results;
                    renderResults(results, hasVoted);
                    if (!hasVoted) {
                        renderVotingForm();
                    }
                } else if (hasVoted) {
                    // User already voted
                    const results = await api(`/polls/${pollId}/results`).catch(() => null);
                    currentResults = results;
                    renderResults(results, true);
                } else {
                    // Results hidden or visible after vote only
                    renderVotingForm();
                }
            } catch (e) {
                document.getElementById('pollContainer').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
            }
        }

        function renderResults(results, alreadyVoted) {
            console.log('[DEBUG] renderResults called, alreadyVoted:', alreadyVoted, 'selectedOptionIds:', selectedOptionIds);
            const block = document.getElementById('resultsBlock');
            if (!block || !results) return;

            const total = results.totalVotes;

            block.innerHTML = `
                <div class="mb-4">
                    <p class="text-muted text-center">Всего голосов: <strong class="fs-4 text-dark">${total}</strong></p>
                    ${pollData.isRealtime && pollData.status === 'Active' && (!pollData.endsAt || new Date(pollData.endsAt) >= new Date()) ? '<div class="text-center"><span class="badge bg-danger mb-2">ONLINE / LIVE</span></div>' : ''}
                </div>

                ${alreadyVoted ? `
                <div class="alert alert-success d-flex align-items-center mb-4" role="alert">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-check-circle-fill me-2" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>
                    <div>Вы уже проголосовали в этом голосовании. Ваш выбор выделен галочкой. Результаты обновляются в реальном времени.</div>
                </div>
                ` : ''}

                <div class="vstack gap-4 mb-4">
                    ${results.results.map(r => {
                        const pct = r.percentage;
                        const barColor = pct >= 50 ? 'bg-success' : pct >= 20 ? 'bg-secondary' : 'bg-secondary';
                        const isMyChoice = selectedOptionIds.includes(r.optionId);
                        console.log('[DEBUG] option:', r.optionText, 'optionId:', r.optionId, 'isMyChoice:', isMyChoice);
                        return `
                        <div class="result-item ${isMyChoice ? 'border-start border-4 border-dark ps-3' : ''}">
                            <div class="d-flex justify-content-between align-items-end mb-2">
                                <span class="fs-5 fw-semibold">
                                    ${isMyChoice ? '<span class="badge bg-dark me-2">Ваш выбор</span>' : ''}${r.optionText}
                                </span>
                                <div class="text-end">
                                    <span class="fs-4 fw-bold text-dark">${r.count}</span>
                                    <span class="text-muted"> голосов</span>
                                    <span class="badge ${barColor} ms-2">${pct}%</span>
                                </div>
                            </div>
                            <div class="progress" style="height: 36px;">
                                <div class="progress-bar ${barColor}" role="progressbar"
                                     style="width: ${pct}%" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100">
                                    ${pct > 8 ? pct + '%' : ''}
                                </div>
                            </div>
                        </div>
                        `;
                    }).join('')}
                </div>
            `;
            block.style.display = 'block';

            if (pollData.isRealtime && !connection) {
                startSignalR();
            }
        }

        function renderVotingForm() {
            const block = document.getElementById('voteFormBlock');
            if (!block) return;

            const isMultiple = pollData.type === 'MultipleChoice';
            const inputType = isMultiple ? 'checkbox' : 'radio';
            const nameAttr = isMultiple ? '' : `name="pollOption"`;

            block.innerHTML = `
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Выберите вариант${isMultiple ? 'ы' : ''}</h5>
                        <div id="voteOptions">
                            ${pollData.options.map((opt, idx) => `
                                <div class="option-card mb-3" data-index="${idx}" onclick="toggleOption(${idx})">
                                    <div class="card option-selectable-vote cursor-pointer">
                                        <div class="row g-0">
                                            ${opt.imageUrl ? `
                                            <div class="col-auto">
                                                <img src="${resolveImageUrl(opt.imageUrl)}" class="option-image-vote" alt="${opt.text}">
                                            </div>` : ''}
                                            <div class="col">
                                                <div class="card-body d-flex align-items-center h-100">
                                                    <input type="${inputType}" class="option-input me-3" id="optInput${idx}" value="${opt.id}" ${nameAttr}>
                                                    <span class="fs-5 fw-medium">${opt.text}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <button type="button" class="btn btn-success w-100 mt-3 py-2 fs-5" onclick="submitVote()">
                            Проголосовать
                        </button>
                    </div>
                </div>
            `;
            block.style.display = 'block';
        }

        function toggleOption(idx) {
            const input = document.getElementById(`optInput${idx}`);
            if (!input) return;
            const card = input.closest('.option-selectable-vote');
            const isMultiple = pollData.type === 'MultipleChoice';

            if (isMultiple) {
                input.checked = !input.checked;
                card.classList.toggle('selected', input.checked);
            } else {
                const allInputs = document.querySelectorAll('.option-input');
                const allCards = document.querySelectorAll('.option-selectable-vote');
                
                if (input.checked) {
                    input.checked = false;
                    allCards.forEach(c => c.classList.remove('selected'));
                } else {
                    allInputs.forEach(i => i.checked = false);
                    allCards.forEach(c => c.classList.remove('selected'));
                    input.checked = true;
                    card.classList.add('selected');
                }
            }
        }

        async function submitVote() {
            const inputs = document.querySelectorAll('.option-input:checked');
            if (inputs.length === 0) {
                Toast.warning('Выберите хотя бы один вариант');
                return;
            }
            const optionIds = Array.from(inputs).map(i => i.value);

            try {
                await api(`/polls/${pollId}/vote`, {
                    method: 'POST',
                    body: { optionIds }
                });
                Toast.success('Голос принят!');
                hasVoted = true;
                
                // Hide voting form
                const formBlock = document.getElementById('voteFormBlock');
                if (formBlock) formBlock.style.display = 'none';
                
                // Fetch and show updated results
                const results = await api(`/polls/${pollId}/results`).catch(() => null);
                if (results) {
                    renderResults(results, true);
                }
            } catch (e) {
                Toast.error(e.message);
            }
        }

        function startSignalR() {
            if (connection) return;

            connection = new signalR.HubConnectionBuilder()
                .withUrl(`http://localhost:5000/hubs/poll?access_token=${localStorage.getItem('accessToken')}`)
                .withAutomaticReconnect()
                .build();

            connection.on('ResultsUpdated', (results) => {
                currentResults = results;
                renderResults(results, hasVoted);
            });

            connection.start().then(() => {
                connection.invoke('JoinPollGroup', pollId);
            }).catch(err => console.error('SignalR error:', err));
        }

        loadPoll();
    </script>
</body>
</html>
