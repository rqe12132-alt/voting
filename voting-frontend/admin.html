<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" id="mainNav"></nav>

    <div class="container mt-4">
        <h1>Админ-панель</h1>

        <ul class="nav nav-pills mb-4 mt-3" id="adminTabs">
            <li class="nav-item">
                <a class="nav-link active" href="#" onclick="showAdminTab('create')">Создать голосование</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="showAdminTab('manage')">Управление</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/audit.html">Журнал аудита</a>
            </li>
        </ul>

        <div id="createTab">
            <div class="card">
                <div class="card-body">
                    <form id="createPollForm" onsubmit="event.preventDefault(); createPoll();">
                        <div class="mb-3">
                            <label class="form-label">Название</label>
                            <input type="text" class="form-control" id="pollTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea class="form-control" id="pollDescription" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Изображение голосования</label>
                            <input type="file" class="form-control" id="pollImageFile" accept="image/*" onchange="handlePollImageUpload()">
                            <input type="hidden" id="pollImageUrl" value="">
                            <div id="pollImagePreview" class="mt-2 d-none">
                                <img src="" class="img-thumbnail" style="max-height:150px;" alt="Preview">
                            </div>
                            <div class="form-text">Загрузите фото с компьютера. Макс. 5 МБ.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Тип голосования</label>
                            <select class="form-select" id="pollType" onchange="onTypeChange()">
                                <option value="SingleChoice">Один вариант</option>
                                <option value="MultipleChoice">Несколько вариантов</option>
                                <option value="YesNo">Да / Нет</option>
                            </select>
                        </div>
                        <div class="mb-3" id="optionsBlock">
                            <label class="form-label">Варианты ответа</label>
                            <div id="optionsList">
                                <div class="option-row mb-3 border rounded p-3">
                                    <div class="row g-2">
                                        <div class="col-md-6">
                                            <input type="text" class="form-control option-text" placeholder="Вариант 1" required>
                                        </div>
                                        <div class="col-md-6">
                                            <input type="file" class="form-control option-file" accept="image/*" onchange="handleOptionImageUpload(this)">
                                            <input type="hidden" class="option-image-url" value="">
                                            <div class="option-image-preview mt-2 d-none">
                                                <img src="" class="img-thumbnail" style="max-height:80px;" alt="">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="option-row mb-3 border rounded p-3">
                                    <div class="row g-2">
                                        <div class="col-md-6">
                                            <input type="text" class="form-control option-text" placeholder="Вариант 2" required>
                                        </div>
                                        <div class="col-md-6">
                                            <input type="file" class="form-control option-file" accept="image/*" onchange="handleOptionImageUpload(this)">
                                            <input type="hidden" class="option-image-url" value="">
                                            <div class="option-image-preview mt-2 d-none">
                                                <img src="" class="img-thumbnail" style="max-height:80px;" alt="">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addOption()">+ Добавить вариант</button>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Видимость результатов</label>
                                <select class="form-select" id="pollVisibility">
                                    <option value="AlwaysVisible">Всегда видны</option>
                                    <option value="VisibleAfterVote">После голосования</option>
                                    <option value="Hidden">Скрыты до окончания</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Real-time</label>
                                <div class="form-check mt-2">
                                    <input class="form-check-input" type="checkbox" id="pollRealtime" checked>
                                    <label class="form-check-label" for="pollRealtime">Обновлять результаты live</label>
                                </div>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Начало (опционально)</label>
                                <input type="datetime-local" class="form-control" id="pollStartsAt">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Окончание (опционально)</label>
                                <input type="datetime-local" class="form-control" id="pollEndsAt">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success">Сохранить черновик</button>
                    </form>
                    <div id="createMsg" class="mt-3"></div>
                </div>
            </div>
        </div>

        <div id="manageTab" style="display:none">
            <div id="pollsTableContainer">
                <div class="text-center">
                    <div class="spinner-border" role="status"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        initAuth().then(ok => {
            if (!ok || !isAdmin()) {
                window.location.href = '/index.html';
            }
        });

        // Poll image upload
        async function handlePollImageUpload() {
            const fileInput = document.getElementById('pollImageFile');
            const file = fileInput.files[0];
            if (!file) return;

            const result = await uploadFile(file);
            if (result) {
                document.getElementById('pollImageUrl').value = result.url;
                const preview = document.getElementById('pollImagePreview');
                preview.querySelector('img').src = resolveImageUrl(result.url);
                preview.classList.remove('d-none');
            }
        }

        // Option image upload
        async function handleOptionImageUpload(fileInput) {
            const file = fileInput.files[0];
            if (!file) return;

            const result = await uploadFile(file);
            if (result) {
                const row = fileInput.closest('.option-row');
                row.querySelector('.option-image-url').value = result.url;
                const preview = row.querySelector('.option-image-preview');
                preview.querySelector('img').src = resolveImageUrl(result.url);
                preview.classList.remove('d-none');
            }
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE_URL}/upload/image`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('accessToken')}`
                    },
                    body: formData
                });
                if (!response.ok) {
                    const err = await response.json().catch(() => ({ message: 'Ошибка загрузки' }));
                    Toast.error(err.message);
                    return null;
                }
                return await response.json();
            } catch (e) {
                Toast.error(e.message);
                return null;
            }
        }

        function showAdminTab(tab) {
            document.getElementById('createTab').style.display = tab === 'create' ? 'block' : 'none';
            document.getElementById('manageTab').style.display = tab === 'manage' ? 'block' : 'none';
            document.querySelectorAll('#adminTabs .nav-link').forEach(el => {
                if (el.getAttribute('href') === '#') el.classList.remove('active');
            });
            event.target.classList.add('active');
            if (tab === 'manage') loadManagePolls();
        }

        function onTypeChange() {
            const type = document.getElementById('pollType').value;
            const block = document.getElementById('optionsBlock');
            if (type === 'YesNo') {
                block.style.display = 'none';
            } else {
                block.style.display = 'block';
            }
        }

        function addOption() {
            const list = document.getElementById('optionsList');
            const count = list.querySelectorAll('.option-row').length + 1;
            const div = document.createElement('div');
            div.className = 'option-row mb-3 border rounded p-3';
            div.innerHTML = `
                <div class="row g-2">
                    <div class="col-md-6">
                        <input type="text" class="form-control option-text" placeholder="Вариант ${count}">
                    </div>
                    <div class="col-md-6">
                        <input type="file" class="form-control option-file" accept="image/*" onchange="handleOptionImageUpload(this)">
                        <input type="hidden" class="option-image-url" value="">
                        <div class="option-image-preview mt-2 d-none">
                            <img src="" class="img-thumbnail" style="max-height:80px;" alt="">
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(div);
        }

        async function createPoll() {
            const type = document.getElementById('pollType').value;
            const options = type === 'YesNo'
                ? []
                : Array.from(document.querySelectorAll('.option-row')).map(row => ({
                    text: row.querySelector('.option-text').value,
                    imageUrl: row.querySelector('.option-image-url').value || null
                })).filter(v => v.text.trim() !== '');

            const body = {
                title: document.getElementById('pollTitle').value,
                description: document.getElementById('pollDescription').value,
                imageUrl: document.getElementById('pollImageUrl').value || null,
                type: type,
                options: options,
                resultsVisibility: document.getElementById('pollVisibility').value,
                isRealtime: document.getElementById('pollRealtime').checked,
                startsAt: document.getElementById('pollStartsAt').value || null,
                endsAt: document.getElementById('pollEndsAt').value || null
            };

            try {
                const result = await api('/admin/polls', {
                    method: 'POST',
                    body: body
                });
                Toast.success('Голосование создано (черновик)');
                document.getElementById('createPollForm').reset();
                // Reset previews
                document.getElementById('pollImagePreview').classList.add('d-none');
                document.querySelectorAll('.option-image-preview').forEach(p => p.classList.add('d-none'));
                document.querySelectorAll('.option-image-url').forEach(i => i.value = '');
                onTypeChange();
            } catch (e) {
                Toast.error(e.message);
            }
        }

        async function loadManagePolls() {
            try {
                const polls = await api('/admin/polls');
                const container = document.getElementById('pollsTableContainer');

                if (polls.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">Нет созданных голосований</div>';
                    return;
                }

                const rows = polls.map(p => {
                    const optionsHtml = p.options && p.options.length > 0
                        ? `<div class="mt-1"><small class="text-muted">Варианты: ${p.options.map(o => o.text).join(', ')}</small></div>`
                        : '';
                    return `
                    <tr>
                        <td>
                            ${p.imageUrl ? `<img src="${resolveImageUrl(p.imageUrl)}" class="rounded me-2" style="width:60px;height:40px;object-fit:cover;" alt="">` : ''}
                            <div>
                                <strong>${p.title}</strong>
                                ${optionsHtml}
                            </div>
                        </td>
                        <td><span class="badge bg-${statusBadge(p.status)}">${p.status}</span></td>
                        <td>${getTypeLabel(p.type)}</td>
                        <td>${new Date(p.createdAt).toLocaleDateString()}</td>
                        <td>
                            ${p.status === 'Draft' ? `<button class="btn btn-sm btn-success me-1" onclick="publishPoll('${p.id}')">Опубликовать</button>` : ''}
                            ${p.status === 'Active' ? `<button class="btn btn-sm btn-warning me-1" onclick="closePoll('${p.id}')">Закрыть</button>` : ''}
                            ${p.status === 'Active' || p.status === 'Closed' ? `<button class="btn btn-sm btn-outline-secondary me-1" onclick="extendPoll('${p.id}')">Продлить</button>` : ''}
                            ${p.status === 'Active' || p.status === 'Closed' ? `<a class="btn btn-sm btn-outline-primary me-1" href="/poll.html?id=${p.id}" target="_blank">Результаты</a>` : ''}
                            <button class="btn btn-sm btn-outline-info me-1" onclick="exportPoll('${p.id}')">Excel</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deletePoll('${p.id}')">Удалить</button>
                        </td>
                    </tr>
                `}).join('');

                container.innerHTML = `
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr><th>Название</th><th>Статус</th><th>Тип</th><th>Создано</th><th>Действия</th></tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
            } catch (e) {
                Toast.error(e.message);
            }
        }

        function statusBadge(status) {
            switch(status) {
                case 'Draft': return 'secondary';
                case 'Active': return 'success';
                case 'Closed': return 'dark';
                default: return 'light';
            }
        }

        function getTypeLabel(type) {
            switch(type) {
                case 'SingleChoice': return 'Один вариант';
                case 'MultipleChoice': return 'Несколько';
                case 'YesNo': return 'Да/Нет';
                default: return type;
            }
        }

        async function publishPoll(id) {
            if (!confirm('Опубликовать голосование? После публикации редактирование будет недоступно.')) return;
            try {
                await api(`/admin/polls/${id}/publish`, { method: 'POST' });
                Toast.success('Голосование опубликовано');
                loadManagePolls();
            } catch (e) {
                Toast.error(e.message);
            }
        }

        async function closePoll(id) {
            if (!confirm('Закрыть голосование? После закрытия голосование станет неактивным.')) return;
            try {
                await api(`/admin/polls/${id}/close`, { method: 'POST' });
                Toast.success('Голосование закрыто');
                loadManagePolls();
            } catch (e) {
                Toast.error(e.message);
            }
        }

        async function extendPoll(id) {
            const days = prompt('На сколько дней продлить голосование? (0 = без срока)', '7');
            if (days === null) return;
            
            const numDays = parseInt(days);
            let newDate = null;
            if (numDays > 0) {
                const d = new Date();
                d.setDate(d.getDate() + numDays);
                newDate = d.toISOString();
            }

            try {
                await api(`/admin/polls/${id}/extend`, { 
                    method: 'POST',
                    body: { endsAt: newDate }
                });
                Toast.success(numDays > 0 ? `Голосование продлено на ${numDays} дней` : 'Срок окончания снят');
                loadManagePolls();
            } catch (e) {
                Toast.error(e.message);
            }
        }

        async function deletePoll(id) {
            if (!confirm('Удалить голосование? Это действие нельзя отменить.')) return;
            try {
                await api(`/admin/polls/${id}`, { method: 'DELETE' });
                Toast.success('Голосование удалено');
                loadManagePolls();
            } catch (e) {
                Toast.error(e.message);
            }
        }

        async function exportPoll(id) {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/polls/${id}/export`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('accessToken')}`
                    }
                });
                if (!response.ok) throw new Error('Ошибка экспорта');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `poll-${id}.xlsx`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                Toast.success('Excel файл скачан');
            } catch (e) {
                Toast.error(e.message);
            }
        }
    </script>
</body>
</html>
