<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary" id="mainNav"></nav>

    <div class="hero-section text-white text-center py-5 mb-4">
        <div class="container">
            <h1 class="display-5 fw-bold">Активные голосования</h1>
            <p class="lead opacity-75">Выберите голосование и выразите свое мнение</p>
        </div>
    </div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="sortDropdown" data-bs-toggle="dropdown">
                    Сортировка: новые
                </button>
                <ul class="dropdown-menu" aria-labelledby="sortDropdown">
                    <li><a class="dropdown-item" href="#" onclick="setSort('newest')">Новые сначала</a></li>
                    <li><a class="dropdown-item" href="#" onclick="setSort('oldest')">Старые сначала</a></li>
                    <li><a class="dropdown-item" href="#" onclick="setSort('popular')">Популярные</a></li>
                </ul>
            </div>
        </div>

        <div id="pollsList" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-muted mt-2">Загрузка голосований...</p>
            </div>
        </div>

        <div class="text-center mt-4 mb-5" id="loadMoreContainer">
            <button class="btn btn-outline-primary" id="loadMoreBtn" onclick="loadMore()" style="display:none;">
                Загрузить еще
            </button>
        </div>

        <div class="text-center mt-4 mb-5" id="closedToggleContainer">
            <button class="btn btn-outline-secondary" onclick="toggleClosed()">
                Показать завершенные голосования
            </button>
        </div>
    </div>

    <footer class="bg-light text-center py-4 mt-5 border-top">
        <div class="container">
            <p class="text-muted mb-0">Онлайн-сервис голосований</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        initAuth();

        let currentPage = 1;
        const pageSize = 6;
        let currentSort = 'newest';
        let showClosed = false;
        let hasMore = false;
        let allPolls = [];

        async function loadPolls(reset = true) {
            if (reset) {
                currentPage = 1;
                allPolls = [];
            }

            try {
                const result = await api(`/polls?page=${currentPage}&pageSize=${pageSize}&includeClosed=${showClosed}`);
                const polls = result.items || [];
                hasMore = result.hasMore;

                allPolls = allPolls.concat(polls);
                sortPolls();
                renderPolls();

                document.getElementById('loadMoreBtn').style.display = hasMore ? 'inline-block' : 'none';
            } catch (e) {
                Toast.error(e.message);
                document.getElementById('pollsList').innerHTML = `<div class="col-12"><div class="alert alert-danger">${e.message}</div></div>`;
            }
        }

        function sortPolls() {
            switch(currentSort) {
                case 'newest':
                    allPolls.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    break;
                case 'oldest':
                    allPolls.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                    break;
                case 'popular':
                    // In real app, would sort by vote count
                    allPolls.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    break;
            }
        }

        function setSort(sort) {
            currentSort = sort;
            const labels = { newest: 'Новые сначала', oldest: 'Старые сначала', popular: 'Популярные' };
            document.getElementById('sortDropdown').textContent = 'Сортировка: ' + labels[sort];
            sortPolls();
            renderPolls();
        }

        function renderPolls() {
            const container = document.getElementById('pollsList');

            if (allPolls.length === 0) {
                container.innerHTML = '<div class="col-12"><div class="alert alert-info">Нет активных голосований</div></div>';
                return;
            }

            container.innerHTML = allPolls.map(poll => `
                <div class="col-md-6 col-lg-4">
                    <div class="card poll-card h-100 shadow-sm border-0">
                        <div class="poll-image-wrapper">
                            <img src="${resolveImageUrl(poll.imageUrl) || 'https://images.unsplash.com/photo-1540910419-bcae71f8fe6e?w=600&h=400&fit=crop'}"
                                 class="card-img-top poll-image" alt="${poll.title}">
                            <div class="poll-image-overlay"></div>
                            <span class="badge bg-${getTypeBadge(poll.type)} poll-type-badge">${getTypeLabel(poll.type)}</span>
                            ${poll.status === 'Closed' ? '<span class="badge bg-dark poll-closed-badge">ЗАВЕРШЕНО</span>' : ''}
                            ${poll.startsAt && new Date(poll.startsAt) > new Date() ? '<span class="badge bg-info poll-planned-badge">СКОРО</span>' : (poll.isRealtime ? '<span class="badge bg-danger poll-live-badge">LIVE</span>' : '')}
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${poll.title}</h5>
                            <p class="card-text text-muted small">${poll.endsAt ? 'До ' + formatDate(poll.endsAt) : 'Без срока окончания'}</p>
                            ${poll.hasVoted
                                ? `<div class="alert alert-success py-2 mb-2"><small>Вы уже проголосовали</small></div>
                                   <a href="/poll.html?id=${poll.id}" class="btn btn-outline-primary mt-auto">Посмотреть результаты</a>`
                                : `<a href="/poll.html?id=${poll.id}" class="btn btn-primary mt-auto">Проголосовать</a>`
                            }
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function loadMore() {
            currentPage++;
            await loadPolls(false);
        }

        function toggleClosed() {
            showClosed = true;
            document.getElementById('closedToggleContainer').innerHTML = '<button class="btn btn-outline-secondary" onclick="hideClosed()">Скрыть завершенные</button>';
            loadPolls(true);
        }

        function hideClosed() {
            showClosed = false;
            document.getElementById('closedToggleContainer').innerHTML = '<button class="btn btn-outline-secondary" onclick="toggleClosed()">Показать завершенные голосования</button>';
            loadPolls(true);
        }

        function getTypeBadge(type) {
            switch(type) {
                case 'SingleChoice': return 'info';
                case 'MultipleChoice': return 'warning';
                case 'YesNo': return 'secondary';
                default: return 'light';
            }
        }

        function getTypeLabel(type) {
            switch(type) {
                case 'SingleChoice': return 'Один вариант';
                case 'MultipleChoice': return 'Несколько';
                case 'YesNo': return 'Да / Нет';
                default: return type;
            }
        }

        loadPolls();
    </script>
</body>
</html>
