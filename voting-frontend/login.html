<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Голосования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">Онлайн-голосования</h2>

                        <ul class="nav nav-tabs mb-3" id="authTabs">
                            <li class="nav-item">
                                <a class="nav-link active" href="#" onclick="showTab('login')">Вход</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showTab('register')">Регистрация</a>
                            </li>
                        </ul>

                        <div id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="loginEmail" placeholder="user@example.com" oninput="clearError('loginEmailError')">
                                <div id="loginEmailError" class="invalid-feedback d-block"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="loginPassword" placeholder="••••••">
                            </div>
                            <button class="btn btn-primary w-100" onclick="doLogin()">Войти</button>
                        </div>

                        <div id="registerForm" style="display:none">
                            <div class="mb-3">
                                <label class="form-label">ФИО</label>
                                <input type="text" class="form-control" id="regFullName" placeholder="Иван Иванов" oninput="clearError('regFullNameError')">
                                <div id="regFullNameError" class="invalid-feedback d-block"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="regEmail" placeholder="user@example.com" oninput="clearError('regEmailError')">
                                <div id="regEmailError" class="invalid-feedback d-block"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="regPassword" placeholder="••••••" oninput="clearError('regPasswordError')">
                                <div id="regPasswordError" class="invalid-feedback d-block"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Код администратора (опционально)</label>
                                <input type="text" class="form-control" id="regAdminCode" placeholder="">
                                <div class="form-text">Оставьте пустым, если вы не администратор</div>
                            </div>
                            <button class="btn btn-success w-100" onclick="doRegister()">Зарегистрироваться</button>
                        </div>

                        <div id="message" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        function showTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            document.querySelectorAll('#authTabs .nav-link').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            clearAllErrors();
            document.getElementById('message').innerHTML = '';
        }

        function showMessage(text, type = 'info') {
            if (type === 'success') Toast.success(text, 5000);
            else if (type === 'danger') Toast.error(text, 5000);
            else if (type === 'warning') Toast.warning(text, 5000);
            else Toast.info(text, 5000);
        }

        function showFieldError(fieldId, text) {
            const el = document.getElementById(fieldId);
            el.textContent = text;
            el.style.display = 'block';
        }

        function clearError(fieldId) {
            const el = document.getElementById(fieldId);
            if (el) {
                el.textContent = '';
                el.style.display = 'none';
            }
        }

        function clearAllErrors() {
            ['loginEmailError','regFullNameError','regEmailError','regPasswordError'].forEach(clearError);
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        async function doLogin() {
            clearAllErrors();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email) {
                showFieldError('loginEmailError', 'Введите email');
                return;
            }
            if (!isValidEmail(email)) {
                showFieldError('loginEmailError', 'Введите корректный email (например, user@example.com)');
                return;
            }
            if (!password) {
                showMessage('Введите пароль', 'warning');
                return;
            }

            try {
                const result = await api('/auth/login', {
                    method: 'POST',
                    body: { email, password }
                });
                setAuth(result);
                if (result.user && !result.user.emailVerified) {
                    showMessage('Вход выполнен. Подтвердите email, чтобы продолжить.', 'warning');
                    setTimeout(() => window.location.href = '/verify-email.html', 800);
                } else {
                    showMessage('Успешный вход! Перенаправление...', 'success');
                    setTimeout(() => window.location.href = '/index.html', 800);
                }
            } catch (e) {
                showMessage(e.message, 'danger');
            }
        }

        async function doRegister() {
            clearAllErrors();
            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const adminCode = document.getElementById('regAdminCode').value || null;

            let hasError = false;
            if (!fullName) {
                showFieldError('regFullNameError', 'Введите ФИО');
                hasError = true;
            }
            if (!email) {
                showFieldError('regEmailError', 'Введите email');
                hasError = true;
            } else if (!isValidEmail(email)) {
                showFieldError('regEmailError', 'Введите корректный email (например, user@example.com)');
                hasError = true;
            }
            if (!password || password.length < 6) {
                showFieldError('regPasswordError', 'Пароль должен быть не менее 6 символов');
                hasError = true;
            }
            if (hasError) return;

            try {
                const result = await api('/auth/register', {
                    method: 'POST',
                    body: { fullName, email, password, adminCode }
                });
                setAuth(result);
                showMessage('Регистрация успешна! Проверьте письмо с кодом подтверждения.', 'success');
                setTimeout(() => window.location.href = '/verify-email.html', 1200);
            } catch (e) {
                showMessage(e.message, 'danger');
            }
        }
    </script>
</body>
</html>
